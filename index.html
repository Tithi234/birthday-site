<!DOCTYPE html>
<html>

<head>

<title>Initializing Nachiketa v19 🚨</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="style.css">

<style>

#loadingScreen{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:black;
color:#00ff9f;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
font-family:monospace;
z-index:1000;
}

.hidden{
display:none;
}

</style>

</head>

<body>

<div id="loadingScreen">

<p>Initializing Nachiketa v19...</p>
<p>Loading Meme Engine...</p>
<p>Checking Political Debate Module...</p>
<p>Activating Jhol Momo Protocol...</p>
<p>System Ready 🚀</p>

</div>


<div class="container hidden" id="mainContent">

<h1>🚨 Level 19 Loading 🚨</h1>

<p>Countdown to Nachiketa turning 19</p>

<h2 id="countdown"></h2>

<br>

<a href="story.html" class="button">Enter the Chaos →</a>

</div>


<script>

/* loading screen */

setTimeout(function(){

document.getElementById("loadingScreen").style.display="none";
document.getElementById("mainContent").classList.remove("hidden");

},3500);


/* countdown */

const birthday = new Date("March 27, 2025 00:00:00").getTime();

setInterval(function(){

const now = new Date().getTime();
const distance = birthday - now;

const days = Math.floor(distance/(1000*60*60*24));
const hours = Math.floor((distance%(1000*60*60*24))/(1000*60*60));
const minutes = Math.floor((distance%(1000*60*60))/(1000*60));
const seconds = Math.floor((distance%(1000*60))/1000);

document.getElementById("countdown").innerHTML =
days+"d "+hours+"h "+minutes+"m "+seconds+"s ";

},1000);

</script>

</body>

</html>
