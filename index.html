<!DOCTYPE html>
<html>
<head>
<title>Level 19 Loading 🚨</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="container">

<h1>🚨 Level 19 Loading 🚨</h1>

<p>Countdown to Nachiketa turning 19...</p>

<h2 id="countdown"></h2>

<br>

<p>Initializing Nachiketa v19.0...</p>

<a href="story.html" class="button">Enter the Chaos →</a>

</div>

<script>

const birthday = new Date("March 27, 2025 00:00:00").getTime();

setInterval(function() {

const now = new Date().getTime();
const distance = birthday - now;

const days = Math.floor(distance / (1000*60*60*24));
const hours = Math.floor((distance % (1000*60*60*24)) / (1000*60*60));
const minutes = Math.floor((distance % (1000*60*60)) / (1000*60));
const seconds = Math.floor((distance % (1000*60)) / 1000);

document.getElementById("countdown").innerHTML =
days + "d " + hours + "h " + minutes + "m " + seconds + "s ";

},1000);

</script>

</body>
</html>
